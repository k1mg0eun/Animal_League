<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학점 탄막전</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0a0c1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Noto Sans KR',-apple-system,sans-serif;}
#G{width:400px;height:640px;position:relative;margin:0 auto;border-radius:20px;overflow:hidden;background:#060918;box-shadow:0 20px 60px rgba(0,0,0,.5);}
#cv{position:absolute;inset:0;display:block;width:400px;height:640px;}
#hud{position:absolute;top:0;left:0;right:0;height:50px;background:rgba(6,9,24,.94);border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px;padding:0 14px;z-index:5;}
.hw{display:flex;align-items:center;gap:6px;flex:1;}
.ht{flex:1;height:6px;background:rgba(255,255,255,.1);border-radius:100px;overflow:hidden;}
#hb{height:100%;border-radius:100px;background:#00C471;transition:width .3s,background .3s;}
#gz{font-size:9px;font-weight:700;color:#FFD060;min-width:56px;text-align:center;}
.sb{display:flex;flex-direction:column;align-items:flex-end;}
#sn{font-size:17px;font-weight:900;color:#fff;line-height:1;letter-spacing:-.5px;}
.sl{font-size:8px;color:rgba(255,255,255,.3);}
#pnm{position:absolute;bottom:4px;left:14px;font-size:8px;font-weight:700;color:#3182F6;}
.ov{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;}
.hide{display:none!important;}
#s0{background:linear-gradient(160deg,#060918,#0c1428);}
.s0h{padding:28px 22px 20px;position:relative;overflow:hidden;flex-shrink:0;}
.s0h::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(49,130,246,.07);top:-70px;right:-50px;}
.ico{font-size:40px;display:block;margin-bottom:8px;animation:fl 3s ease-in-out infinite;}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.ttl{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.5px;}
.sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:4px;}
.bd{padding:14px 20px 20px;display:flex;flex-direction:column;gap:13px;flex:1;overflow-y:auto;}
.gps{display:flex;gap:4px;}
.gp{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px 6px;border-radius:9px;gap:2px;}
.gp b{font-size:15px;font-weight:900;}.gp small{font-size:7.5px;font-weight:600;opacity:.75;}
.ga{background:#0a2a1a;color:#00C471;}.gb{background:#0a1a30;color:#3182F6;}
.gc{background:#2a2000;color:#D4B800;}.gd{background:#2a1200;color:#E06000;}
.ge{background:#2a0808;color:#D02030;}.gf{background:#1a0808;color:#FF5C6A;}
.il{font-size:11px;font-weight:700;color:rgba(255,255,255,.45);}
.ir{display:flex;align-items:center;background:rgba(255,255,255,.05);border-radius:9px;border:1.5px solid rgba(255,255,255,.1);padding:0 12px;transition:border-color .2s;}
.ir:focus-within{border-color:#3182F6;}
#pi{font-family:inherit;font-size:14px;font-weight:700;color:#fff;background:transparent;border:none;outline:none;width:100%;padding:11px 0 11px 8px;}
#pi::placeholder{color:rgba(255,255,255,.22);font-weight:400;}
.phases-preview{display:flex;flex-direction:column;gap:5px;}
.pp{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:9px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);}
.pp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.pp-txt{display:flex;flex-direction:column;}
.pp-month{font-size:9px;font-weight:700;opacity:.6;}
.pp-name{font-size:11px;font-weight:700;}
.ch{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
.cc{display:flex;align-items:center;gap:3px;background:rgba(255,255,255,.04);border-radius:16px;padding:5px 9px;font-size:9.5px;font-weight:600;color:rgba(255,255,255,.35);}
.kb{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:3px;padding:1px 4px;font-size:8.5px;color:rgba(255,255,255,.55);}
#bt{font-family:inherit;font-size:15px;font-weight:800;width:100%;padding:15px;background:#3182F6;color:#fff;border:none;border-radius:13px;cursor:pointer;box-shadow:0 4px 18px rgba(49,130,246,.38);transition:background .15s,transform .1s;letter-spacing:-.2px;}
#bt:hover{background:#1A6BFF;}#bt:active{transform:scale(.98);}
#s2{background:linear-gradient(160deg,#060918,#0c1428);}
.rt{padding:24px 22px 16px;text-align:center;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.rb{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 11px;animation:pp2 .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes pp2{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.rb2{font-size:11px;color:rgba(255,255,255,.4);font-weight:500;margin-bottom:4px;}
.rq{font-size:14px;font-weight:700;color:#fff;line-height:1.55;}
.rc{padding:14px 16px;display:flex;flex-direction:column;gap:8px;flex:1;}
.rr{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:11px;padding:12px 15px;display:flex;align-items:center;justify-content:space-between;}
.rl{font-size:12px;font-weight:500;color:rgba(255,255,255,.4);}
.rv{font-size:17px;font-weight:900;color:#fff;letter-spacing:-.5px;}
.rf{padding:0 16px 18px;display:flex;flex-direction:column;gap:7px;}
#rb2{font-family:inherit;font-size:14px;font-weight:800;width:100%;padding:15px;background:#3182F6;color:#fff;border:none;border-radius:12px;cursor:pointer;box-shadow:0 4px 14px rgba(49,130,246,.3);transition:transform .1s;}
#rb2:active{transform:scale(.98);}
#hb2{font-family:inherit;font-size:13px;font-weight:600;width:100%;padding:13px;background:transparent;color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.1);border-radius:12px;cursor:pointer;}
</style>
</head>
<body>
<div id="G">
<canvas id="cv" width="400" height="640"></canvas>

<div id="hud" class="hide">
  <div class="hw">
    <span style="font-size:13px">❤️</span>
    <div class="ht"><div id="hb" style="width:100%"></div></div>
  </div>
  <div id="gz">GRAZE 0</div>
  <div class="sb"><div id="sn">0</div><div class="sl">점수</div></div>
  <div id="pnm">● 개강의 달</div>
</div>

<div class="ov" id="s0">
  <div class="s0h">
    <span class="ico">🎓</span>
    <div class="ttl">학점 탄막전</div>
    <div class="sub">3월부터 6월까지 — 한 학기를 버텨라!</div>
  </div>
  <div class="bd">
    <div class="gps">
      <div class="gp ga"><b>A</b><small>+15❤</small></div>
      <div class="gp gb"><b>B</b><small>+5❤</small></div>
      <div class="gp gc"><b>C</b><small>-10</small></div>
      <div class="gp gd"><b>D</b><small>-20</small></div>
      <div class="gp ge"><b>E</b><small>-30</small></div>
      <div class="gp gf"><b>F</b><small>즉사💀</small></div>
    </div>
    <div class="phases-preview">
      <div class="pp"><div class="pp-dot" style="background:#3182F6"></div><div class="pp-txt"><div class="pp-month" style="color:#3182F6">3월</div><div class="pp-name" style="color:#7BB8FF">개강의 달</div></div></div>
      <div class="pp"><div class="pp-dot" style="background:#FF6BA8"></div><div class="pp-txt"><div class="pp-month" style="color:#FF6BA8">4월</div><div class="pp-name" style="color:#FFB0CF">벚꽃 그리고 중간고사</div></div></div>
      <div class="pp"><div class="pp-dot" style="background:#00C471"></div><div class="pp-txt"><div class="pp-month" style="color:#00C471">5월</div><div class="pp-name" style="color:#5DEBA0">축제의 달</div></div></div>
      <div class="pp"><div class="pp-dot" style="background:#D02030"></div><div class="pp-txt"><div class="pp-month" style="color:#D02030">6월</div><div class="pp-name" style="color:#FF6070">기말고사 그리고 종강의 달</div></div></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:5px;">
      <div class="il">교수님 성함</div>
      <div class="ir"><span style="font-size:15px">👨‍🏫</span><input id="pi" type="text" placeholder="예: 홍길동" maxlength="10" autocomplete="off"/></div>
    </div>
    <div class="ch">
      <div class="cc"><span class="kb">←</span><span class="kb">→</span><span class="kb">↑</span><span class="kb">↓</span>이동</div>
      <div class="cc"><span class="kb">Shift</span>집중·저속</div>
      <div class="cc">👆 터치 이동</div>
    </div>
    <button id="bt">게임 시작하기</button>
  </div>
</div>

<div class="ov hide" id="s2">
  <div class="rt">
    <div class="rb" id="rbg"></div>
    <div class="rb2" id="rby"></div>
    <div class="rq" id="rqt"></div>
  </div>
  <div class="rc">
    <div class="rr"><span class="rl">🏆 최종 점수</span><span class="rv" id="rv0"></span></div>
    <div class="rr"><span class="rl">⏱ 생존 시간</span><span class="rv" id="rv1"></span></div>
    <div class="rr"><span class="rl">✨ 그레이즈</span><span class="rv" id="rv2"></span></div>
    <div class="rr"><span class="rl">📅 마지막 페이즈</span><span class="rv" id="rv3" style="font-size:12px"></span></div>
  </div>
  <div class="rf">
    <button id="rb2">다시 도전하기</button>
    <button id="hb2">처음으로</button>
  </div>
</div>
</div>

<script>
(function(){
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const CW=400,CH=640,HUD=50;

// ── PHASE CONFIG
const PH=[
  {month:'3월',name:'개강의 달',      quote:'"새 학기야. 어디 한번 해봐!"',           bg:'#060918',acc:'#3182F6',ptc:'stars',   fiv:1500,miv:700, wt:[9,13,22,20,16,11],arms:2,startT:0 },
  {month:'4월',name:'벚꽃 그리고 중간고사',quote:'"중간고사다. 이제부터 진심이야."',   bg:'#110718',acc:'#FF6BA8',ptc:'petals',  fiv:1100,miv:500, wt:[6,10,24,22,18,14],arms:3,startT:12},
  {month:'5월',name:'축제의 달',       quote:'"축제라고 방심하면 F야!"',               bg:'#041410',acc:'#00C471',ptc:'confetti',fiv:850, miv:360, wt:[5,8,20,22,22,18], arms:4,startT:24},
  {month:'6월',name:'기말고사 그리고 종강의 달',quote:'"살아남아 봐. 이번엔 진심이야."',bg:'#180608',acc:'#D02030',ptc:'embers', fiv:680, miv:240, wt:[3,5,17,22,23,23],arms:5,startT:36}
];

// ── LETTER CONFIG
const LC={
  A:{c:'#00C471',bg:'rgba(0,90,40,.88)',  tc:'#fff',  sp:3.5,r:13,hr:9},
  B:{c:'#3182F6',bg:'rgba(8,40,130,.88)', tc:'#fff',  sp:3.5,r:12,hr:8},
  C:{c:'#D4B800',bg:'rgba(75,55,0,.88)',  tc:'#1a1000',sp:3.5,r:11,hr:8},
  D:{c:'#E06000',bg:'rgba(95,25,0,.88)',  tc:'#fff',  sp:3.5,r:11,hr:9},
  E:{c:'#D02030',bg:'rgba(85,8,8,.88)',   tc:'#fff',  sp:3.5,r:12,hr:9},
  F:{c:'#FF5C6A',bg:'rgba(55,4,4,.92)',   tc:'#FF9CA6',sp:3.5,r:14,hr:11}
};
const FX={A:15,B:5,C:-10,D:-20,E:-30,F:-999};
const SFX={A:150,B:80,C:8,D:8,E:8,F:8};
const WS=[25,25,4,2,1,0];

// ── STATE
let prof='',hp=100,score=0,graze=0,gTime=0;
let running=false,raf=0,lastT=0,diff=0;
let bullets=[],efx=[],decorPtcs=[],stars=[];
let pTimer=0,patPhase=0,spA=0,spT=0,fireTurn='pattern';
let keys={},touch={x:null,y:null};
let Px=200,Py=560;
let curPh=0,ann={on:false,a:0,t:0,ph:0},endAnn={on:false,a:0,t:0},gameEnding=false;
const HR=5,GZR=20,SPD=3.2,FSP=1.5;

// ── UTILS
function wPick(w){const t=w.reduce((a,b)=>a+b,0);let r=Math.random()*t;for(let i=0;i<6;i++){r-=w[i];if(r<=0)return'ABCDEF'[i];}return'F';}
function rrct(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

// ── PARTICLES
function initStars(){stars=[];for(let i=0;i<85;i++)stars.push({x:Math.random()*CW,y:Math.random()*CH,r:.4+Math.random()*1.2,s:.05+Math.random()*.25,o:.15+Math.random()*.5});}

function initDecor(p){
  decorPtcs=[];
  if(p===1){
    for(let i=0;i<45;i++)decorPtcs.push({t:'p',x:Math.random()*CW,y:Math.random()*CH,r:2.5+Math.random()*3.5,rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.06,vx:.15+Math.random()*.5,vy:.35+Math.random()*.7,op:.3+Math.random()*.5,c:['#FFB7C5','#FF8FAB','#FFCDD8','#FFA8C0','#FF75B0'][Math.floor(Math.random()*5)]});
  } else if(p===2){
    for(let i=0;i<55;i++)decorPtcs.push({t:'c',x:Math.random()*CW,y:Math.random()*CH,w:3+Math.random()*5,h:2+Math.random()*3,rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.12,vx:(Math.random()-.5)*.8,vy:.25+Math.random()*.65,op:.35+Math.random()*.45,c:['#FFD060','#FF6BA8','#00E080','#60B8FF','#FF8C00','#C084FC'][Math.floor(Math.random()*6)]});
  } else if(p===3){
    for(let i=0;i<70;i++){const up=Math.random()<.55;decorPtcs.push({t:'e',x:Math.random()*CW,y:Math.random()*CH,r:.7+Math.random()*2,vx:(Math.random()-.5)*.4,vy:up?(-.1-.5*Math.random()):(.05+.3*Math.random()),li:Math.random(),dc:.003+Math.random()*.005,c:['#FF4422','#FF9900','#FF6600','#FFCC00'][Math.floor(Math.random()*4)]});}
  }
}

function updateDecor(){
  stars.forEach(s=>{s.y+=s.s;if(s.y>CH)s.y=0;});
  decorPtcs.forEach(p=>{
    if(p.t==='p'){p.x+=p.vx;p.y+=p.vy;p.rot+=p.rs;if(p.y>CH+10){p.y=-10;p.x=Math.random()*CW;}}
    else if(p.t==='c'){p.x+=p.vx;p.y+=p.vy;p.rot+=p.rs;if(p.y>CH+10){p.y=-10;p.x=Math.random()*CW;}}
    else if(p.t==='e'){p.x+=p.vx;p.y+=p.vy;p.li-=p.dc;if(p.li<=0){p.li=.7+Math.random()*.3;p.x=Math.random()*CW;p.y=CH*(.4+Math.random()*.6);}}
  });
}

function drawDecor(){
  stars.forEach(s=>{ctx.globalAlpha=s.o;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});
  decorPtcs.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.op||p.li||.4;
    if(p.t==='p'){ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.c;ctx.beginPath();ctx.ellipse(0,0,p.r,p.r*.5,0,0,Math.PI*2);ctx.fill();}
    else if(p.t==='c'){ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.c;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);}
    else if(p.t==='e'){ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  });
  ctx.globalAlpha=1;
}

// ── BOSS
function bossX(){return 200+Math.sin(diff*.0008)*140;}
function bossY(){return HUD+68;}

// ── BULLETS
function spawn(x,y,ang,letter,sm){
  const c=LC[letter],sp=(letter==='F'?3.5:c.sp)*(sm||1);
  bullets.push({x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,letter,c:c.c,bg:c.bg,tc:c.tc,r:c.r,hr:c.hr,gz:false});
}

function fire(){
  const ph=PH[curPh],bx=bossX(),by=bossY(),pa=Math.atan2(Py-by,Px-bx),wt=ph.wt;
  const roll=patPhase%3;
  // 0: 조준 3-way — 플레이어 방향 ±25도, 딱 3발
  if(roll===0){
    const spread=.44;
    for(let i=0;i<3;i++)spawn(bx,by,pa-spread+(i*spread),wPick(i===1?WS:wt));
  }
  // 1: 균등 링 — 딱 8발, 매 발사마다 22.5도씩 회전
  else if(roll===1){
    const n=8,rot=patPhase*(Math.PI/8);
    for(let i=0;i<n;i++)spawn(bx,by,(Math.PI*2/n)*i+rot,wPick(wt));
  }
  // 2: 정조준 + F탄 — A/B 우선 1발 + 페이즈2부터 F 추가
  else{
    spawn(bx,by,pa,wPick(WS));
    if(curPh>=2)spawn(bx,by,pa,'F');
  }
  patPhase++;
}

function spiralTick(dt){
  if(gTime<5)return;
  spT+=dt;
  const iv=Math.max(120,400-diff*.05);
  if(spT<iv)return;spT=0;
  const arms=PH[curPh].arms;
  for(let i=0;i<arms;i++)
    spawn(bossX(),bossY(),spA+(Math.PI*2/arms)*i,wPick(i===0?WS:PH[curPh].wt),.85);
  spA+=.25;
}

// ── PHASE CHECK
function checkPhase(){
  let next=0;
  for(let i=PH.length-1;i>=0;i--){if(gTime>=PH[i].startT){next=i;break;}}
  if(next!==curPh){
    curPh=next;initDecor(curPh);ann={on:true,a:0,t:0,ph:curPh};pTimer=0;spT=0;
    const p=PH[curPh];
    document.getElementById('pnm').textContent='● '+p.name;
    document.getElementById('pnm').style.color=p.acc;
  }
}

function updateAnn(dt){
  if(!ann.on)return;
  ann.t+=dt/1000;const t=ann.t;
  if(t<.5)ann.a=t/.5;
  else if(t<2.4)ann.a=1;
  else if(t<3.1)ann.a=1-(t-2.4)/.7;
  else{ann.on=false;ann.a=0;}
}

function drawAnn(){
  if(!ann.on||ann.a<=0)return;
  const p=PH[ann.ph],a=ann.a;
  ctx.save();
  ctx.globalAlpha=a*.72;ctx.fillStyle='#000';ctx.fillRect(0,0,CW,CH);
  ctx.globalAlpha=a;
  const cw=310,ch=148,cx=(CW-cw)/2,cy=(CH-ch)/2-10;
  ctx.fillStyle='rgba(255,255,255,.04)';rrct(cx,cy,cw,ch,18);ctx.fill();
  ctx.strokeStyle=p.acc+'55';ctx.lineWidth=1.5;ctx.stroke();
  ctx.strokeStyle=p.acc;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(cx+24,cy);ctx.lineTo(cx+cw-24,cy);ctx.stroke();
  ctx.fillStyle=p.acc+'22';rrct(CW/2-24,cy-14,48,26,13);ctx.fill();
  ctx.strokeStyle=p.acc+'66';ctx.lineWidth=1;ctx.stroke();
  ctx.font='700 12px "Noto Sans KR",-apple-system,sans-serif';
  ctx.fillStyle=p.acc;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(p.month,CW/2,cy);
  ctx.font='900 17px "Noto Sans KR",-apple-system,sans-serif';
  ctx.fillStyle='#fff';ctx.textBaseline='middle';ctx.fillText(p.name,CW/2,cy+45);
  ctx.strokeStyle=p.acc+'44';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx+28,cy+68);ctx.lineTo(cx+cw-28,cy+68);ctx.stroke();
  ctx.font='400 11px "Noto Sans KR",-apple-system,sans-serif';
  ctx.fillStyle='rgba(255,255,255,.55)';ctx.textBaseline='middle';ctx.fillText(p.quote,CW/2,cy+94);
  for(let i=0;i<PH.length;i++){
    const dotX=CW/2+(i-1.5)*18,dotY=cy+128;
    ctx.fillStyle=i===ann.ph?p.acc:'rgba(255,255,255,.15)';
    ctx.beginPath();ctx.arc(dotX,dotY,i===ann.ph?5:3.5,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}


// ── ENDING ANIMATION
const GAME_END_TIME=48;
function triggerEnding(){
  gameEnding=true;
  bullets=[];efx=[];
  endAnn={on:true,a:0,t:0};
}
function updateEndAnn(dt){
  if(!endAnn.on)return;
  endAnn.t+=dt/1000;const t=endAnn.t;
  if(t<.6)endAnn.a=t/.6;
  else if(t<2.8)endAnn.a=1;
  else if(t<3.5)endAnn.a=1-(t-2.8)/.7;
  else{endAnn.on=false;endAnn.a=0;running=false;setTimeout(showResult,100);}
}
function drawEndAnn(){
  if(!endAnn.on||endAnn.a<=0)return;
  const a=endAnn.a;
  ctx.save();
  ctx.globalAlpha=a*.8;ctx.fillStyle='#000';ctx.fillRect(0,0,CW,CH);
  ctx.globalAlpha=a;
  const cw=320,ch=160,cx=(CW-cw)/2,cy=(CH-ch)/2-10;
  ctx.fillStyle='rgba(255,255,255,.05)';rrct(cx,cy,cw,ch,18);ctx.fill();
  ctx.strokeStyle='#FFD06088';ctx.lineWidth=2;ctx.stroke();
  ctx.strokeStyle='#FFD060';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(cx+24,cy);ctx.lineTo(cx+cw-24,cy);ctx.stroke();
  ctx.fillStyle='#FFD06022';rrct(CW/2-36,cy-14,72,26,13);ctx.fill();
  ctx.strokeStyle='#FFD06066';ctx.lineWidth=1;ctx.stroke();
  ctx.font='700 12px "Noto Sans KR",-apple-system,sans-serif';
  ctx.fillStyle='#FFD060';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('6월',CW/2,cy);
  ctx.font='900 26px "Noto Sans KR",-apple-system,sans-serif';
  ctx.fillStyle='#fff';ctx.textBaseline='middle';ctx.fillText('🎓 종강이다!',CW/2,cy+48);
  ctx.strokeStyle='#FFD06044';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx+28,cy+76);ctx.lineTo(cx+cw-28,cy+76);ctx.stroke();
  ctx.font='400 11px "Noto Sans KR",-apple-system,sans-serif';
  ctx.fillStyle='rgba(255,255,255,.6)';ctx.textBaseline='middle';
  ctx.fillText('"한 학기, 수고했어. 이제 결과를 보자."',CW/2,cy+108);
  ctx.restore();
}

// ── HUD
function updateHUD(){
  document.getElementById('hb').style.width=Math.max(0,hp)+'%';
  document.getElementById('hb').style.background=hp>60?'#00C471':hp>30?'#E8C000':'#D02030';
  document.getElementById('sn').textContent=score.toLocaleString();
  document.getElementById('gz').textContent='GRAZE '+graze;
}

// ── DRAW
function draw(){
  const p=PH[curPh];
  ctx.fillStyle=p.bg;ctx.fillRect(0,0,CW,CH);
  drawDecor();
  ctx.strokeStyle=p.acc+'14';ctx.lineWidth=1;ctx.strokeRect(.5,HUD+.5,CW-1,CH-HUD-1);
  ctx.font='500 8px "Noto Sans KR",-apple-system,sans-serif';
  ctx.fillStyle='rgba(255,255,255,.18)';ctx.textAlign='left';ctx.textBaseline='alphabetic';
  ctx.fillText(Math.floor(gTime)+'s',12,HUD+22);
  const BX=bossX(),BY=bossY();
  ctx.fillStyle=p.acc+'08';ctx.beginPath();ctx.arc(BX,BY,52,0,Math.PI*2);ctx.fill();
  if(curPh>=2){const pulse=.07+.05*Math.sin(Date.now()*.007);ctx.strokeStyle=p.acc+Math.floor(pulse*600).toString(16).padStart(2,'0');ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(BX,BY,44,0,Math.PI*2);ctx.stroke();}
  ctx.fillStyle='rgba(255,255,255,.05)';rrct(BX-50,BY-25,100,50,12);ctx.fill();
  ctx.strokeStyle=p.acc+'28';ctx.lineWidth=1;ctx.stroke();
  ctx.font='27px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('👨‍🏫',BX,BY);
  ctx.font='700 9px "Noto Sans KR",-apple-system,sans-serif';ctx.fillStyle='rgba(255,255,255,.55)';ctx.textBaseline='alphabetic';ctx.fillText((prof||'담당')+'교수',BX,BY+38);
  bullets.forEach(b=>{
    ctx.strokeStyle=b.c+'50';ctx.lineWidth=2;ctx.beginPath();ctx.arc(b.x,b.y,b.r+3,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle=b.bg;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=b.c;ctx.lineWidth=1.5;ctx.stroke();
    ctx.font='900 '+(b.r*1.0)+'px "Noto Sans KR",-apple-system,sans-serif';
    ctx.fillStyle=b.tc;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(b.letter,b.x,b.y+1);
  });
  ctx.font='36px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🧑‍💻',Px,Py);
  ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(Px,Py,HR+2.5,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(Px,Py,HR,0,Math.PI*2);ctx.fill();
  if(keys['Shift']||keys['shift']){ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;ctx.setLineDash([3,4]);ctx.beginPath();ctx.arc(Px,Py,GZR,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}
  ctx.font='700 9px "Noto Sans KR",-apple-system,sans-serif';ctx.fillStyle='rgba(255,255,255,.45)';ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillText('즈인공',Px,Py+24);
  efx.forEach(e=>{ctx.globalAlpha=e.l;ctx.font='800 '+e.s+'px "Noto Sans KR",-apple-system,sans-serif';ctx.fillStyle=e.c;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(e.t,e.x,e.y);});
  ctx.globalAlpha=1;
  drawAnn();
  drawEndAnn();
}

// ── GAME LOOP
function loop(ts){
  if(!running)return;
  const dt=lastT?Math.min(ts-lastT,50):16;
  lastT=ts;gTime+=dt/1000;diff+=dt;
  checkPhase();updateDecor();updateAnn(dt);
  const ph=PH[curPh];
  // 종강 조건 체크
  if(gTime>=GAME_END_TIME&&!gameEnding)triggerEnding();
  if(gameEnding)updateEndAnn(dt);
  if(!gameEnding){
    pTimer-=dt;
    if(pTimer<=0){fire();pTimer=Math.max(ph.miv,ph.fiv-diff*.03);}
    spiralTick(dt);
  }
  const foc=keys['Shift']||keys['shift'];
  const sp=foc?FSP:SPD;
  if(gameEnding){updateHUD();draw();raf=requestAnimationFrame(loop);return;}
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a']||keys['A'])dx-=1;
  if(keys['ArrowRight']||keys['d']||keys['D'])dx+=1;
  if(keys['ArrowUp']||keys['w']||keys['W'])dy-=1;
  if(keys['ArrowDown']||keys['s']||keys['S'])dy+=1;
  if(dx&&dy){dx*=.707;dy*=.707;}
  Px=Math.max(12,Math.min(388,Px+dx*sp));
  Py=Math.max(HUD+12,Math.min(628,Py+dy*sp));
  if(touch.x!==null){
    const td=Math.hypot(touch.x-Px,touch.y-Py);
    if(td>3){const ts2=Math.min(1,td/35)*sp*2.2;Px+=((touch.x-Px)/td)*ts2;Py+=((touch.y-Py)/td)*ts2;}
    Px=Math.max(12,Math.min(388,Px));Py=Math.max(HUD+12,Math.min(628,Py));
  }
  bullets=bullets.filter(b=>{
    b.x+=b.vx;b.y+=b.vy;
    if(b.x<-40||b.x>440||b.y<HUD-40||b.y>680)return false;
    const d=Math.hypot(b.x-Px,b.y-Py);
    if(d<b.hr+HR){
      const f=FX[b.letter];hp=Math.max(0,Math.min(100,hp+f));
      score+=SFX[b.letter];
      efx.push({x:b.x,y:b.y,vx:(Math.random()-.5)*1.5,vy:-2.3,l:1,c:f>0?'#00C471':'#FF5C6A',t:f>0?'+'+f+'HP':b.letter==='F'?'💀':f+'HP',s:13});
      if(b.letter==='F'||hp<=0){hp=0;running=false;setTimeout(showResult,400);return false;}
      return false;
    }
    if(!b.gz&&d<b.hr+GZR){b.gz=true;graze++;score+=8;efx.push({x:b.x,y:b.y,vx:0,vy:-1.5,l:.7,c:'#FFD060',t:'GRAZE',s:9});}
    return true;
  });
  efx=efx.filter(e=>{e.x+=e.vx;e.y+=e.vy;e.vy+=.05;e.l-=.045;return e.l>0;});
  score+=Math.floor(dt/200);
  updateHUD();draw();
  raf=requestAnimationFrame(loop);
}

// ── RESULT
function showResult(){
  document.getElementById('hud').classList.add('hide');
  let g,e,m,bg,fg;
  if(score>=4000){g='A+';e='🏆';m='"감탄했다. 네가 최고야."';bg='#0a2a1a';fg='#00C471';}
  else if(score>=2800){g='A';e='🎯';m='"훌륭해. 학문에 정진하게나."';bg='#0a2a1a';fg='#00C471';}
  else if(score>=1900){g='B+';e='👍';m='"조금만 더 하면 A가 보인다."';bg='#0a1a30';fg='#3182F6';}
  else if(score>=1200){g='B';e='📚';m='"그럭저럭. 좀 더 분발하게."';bg='#0a1a30';fg='#3182F6';}
  else if(score>=650){g='C+';e='😅';m='"수업은 들었나? 보충 필요해."';bg='#2a2000';fg='#D4B800';}
  else if(score>=320){g='C';e='😬';m='"재수강을 강력히 권장하겠어."';bg='#2a2000';fg='#D4B800';}
  else if(score>=120){g='D';e='😰';m='"자네… 많이 반성하게나."';bg='#2a1400';fg='#E06000';}
  else{g='F';e='💀';m='"학사경고야. 진심으로 걱정되네."';bg='#1a0808';fg='#FF5C6A';}
  const rb=document.getElementById('rbg');
  rb.style.background=bg;rb.style.border='1px solid '+fg+'44';
  rb.innerHTML='<span style="font-size:26px;font-weight:900;color:'+fg+'">'+g+'</span>';
  document.getElementById('rby').textContent=e+' '+(prof||'담당')+' 교수님의 판정';
  document.getElementById('rqt').textContent=m;
  document.getElementById('rv0').textContent=score.toLocaleString()+'점';
  document.getElementById('rv1').textContent=Math.floor(gTime)+'초';
  document.getElementById('rv2').textContent=graze+'회';
  const cp=PH[curPh];
  document.getElementById('rv3').textContent=cp.month+' '+cp.name;
  document.getElementById('rv3').style.color=cp.acc;
  document.getElementById('s2').classList.remove('hide');
}

// ── START / NAV
function startGame(){
  prof=document.getElementById('pi').value.trim()||'담당';
  hp=100;score=0;graze=0;gTime=0;diff=0;
  bullets=[];efx=[];keys={};touch={x:null,y:null};
  lastT=0;pTimer=0;patPhase=0;spA=0;spT=0;Px=200;Py=560;
  curPh=0;ann={on:true,a:0,t:0,ph:0};endAnn={on:false,a:0,t:0};gameEnding=false;fireTurn='pattern';
  initStars();initDecor(0);
  const p0=PH[0];
  document.getElementById('pnm').textContent='● '+p0.name;
  document.getElementById('pnm').style.color=p0.acc;
  document.getElementById('s0').classList.add('hide');
  document.getElementById('s2').classList.add('hide');
  document.getElementById('hud').classList.remove('hide');
  running=true;cancelAnimationFrame(raf);
  raf=requestAnimationFrame(loop);
}
function goHome(){running=false;cancelAnimationFrame(raf);document.getElementById('hud').classList.add('hide');document.getElementById('s2').classList.add('hide');document.getElementById('s0').classList.remove('hide');}

document.getElementById('bt').addEventListener('click',startGame);
document.getElementById('rb2').addEventListener('click',startGame);
document.getElementById('hb2').addEventListener('click',goHome);
document.getElementById('pi').addEventListener('keydown',function(e){if(e.key==='Enter')startGame();});
document.addEventListener('keydown',function(e){keys[e.key]=true;if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key))e.preventDefault();});
document.addEventListener('keyup',function(e){keys[e.key]=false;});
const G=document.getElementById('G');
G.addEventListener('touchstart',function(e){const t=e.touches[0],r=G.getBoundingClientRect();touch={x:t.clientX-r.left,y:t.clientY-r.top};e.preventDefault();},{passive:false});
G.addEventListener('touchmove',function(e){const t=e.touches[0],r=G.getBoundingClientRect();touch={x:t.clientX-r.left,y:t.clientY-r.top};e.preventDefault();},{passive:false});
G.addEventListener('touchend',function(){touch={x:null,y:null};});
})();
</script>
